services:
  - type: web
    name: slideplay-app
    env: node
    rootDir: finsished front end/Testing2-SlidePlay
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_URL
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false