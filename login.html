<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | SlidePlay</title>
    <link rel="stylesheet" href="login.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet" />
  </head>

  <body class="auth-page">
    <div id="particles"></div>
    <div class="login-box">
      <div class="brand-mark">
        <span class="brand-dot"></span>
        <span class="brand-name">SlidePlay</span>
      </div>
      <div class="login-header">
        <h2>Welcome Back</h2>
        <p class="login-sub">Sign in to your command center</p>
      </div>

      <form id="loginForm">
        <div class="input-box">
          <i class="fa-solid fa-envelope"></i>
          <input
            type="email"
            id="email"
            class="input-field"
            placeholder="Enter your email"
            autocomplete="off"
            required
          />
        </div>

        <div class="input-box">
          <i class="fa-solid fa-lock"></i>
          <input
            type="password"
            id="password"
            class="input-field"
            placeholder="Enter your password"
            autocomplete="off"
            required
          />
          <button type="button" class="toggle-pw" id="togglePw" aria-label="Toggle password visibility">
            <i class="fa-solid fa-eye" id="togglePwIcon"></i>
          </button>
        </div>

        <div class="forgot">
          <section>
            <input type="checkbox" id="check" />
            <label for="check">Remember me</label>
          </section>

          <section>
            <a href="#">Forgot password?</a>
          </section>
        </div>
                <div class="input-submit">
          <button class="submit-btn" type="submit">Sign In</button>
        </div>
      </form>

      <div class="sign-up-link">
        <p>
          Don't have an account?
          <a href="signup.html">Sign Up</a>
        </p>
      </div>
    </div>

    <script>
      const container = document.getElementById("particles");

      function createParticle() {
        const particle = document.createElement("div");
        particle.classList.add("particle");

        // random position
        particle.style.left = Math.random() * 100 + "vw";

        // random size
        const size = Math.random() * 6 + 2;
        particle.style.width = size + "px";
        particle.style.height = size + "px";

        // random speed
        const duration = Math.random() * 5 + 5;
        particle.style.animationDuration = duration + "s";

        container.appendChild(particle);

        // remove after animation
        setTimeout(() => {
          particle.remove();
        }, duration * 1000);
      }

      setInterval(createParticle, 150);

      // Show/hide password toggle
      document.getElementById('togglePw').addEventListener('click', function () {
        const pw = document.getElementById('password');
        const icon = document.getElementById('togglePwIcon');
        if (pw.type === 'password') {
          pw.type = 'text';
          icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
          pw.type = 'password';
          icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
      });
    </script>
    <script src="login.js"></script>
  </body>
</html>
