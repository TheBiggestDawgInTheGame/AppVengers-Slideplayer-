<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SidePlay - Login</title>
    <title>SlidePlay - Login</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- main container -->
    <div class="container">

      <!-- Login Box -->
      <div class="login-box">
        
        <!-- badeg -->
        <div class="floating-badge">📈</div>
        <div class="floating-badge badge2">🎯</div>
        <div class="floating-badge badge3">⭐</div>

        <!-- header -->
        <div class="header">
          <h1>SlidePlay 🎮</h1>
          <p>Level Up Your Learning Game</p>
        </div>

        <!-- Login Form -->
        <form class="login-form" id="loginForm">
          <div class="form-group">
            <label>Login As</label>
            <select id="role" name="role" required>
              <option value="">Select Role</option>
              <option value="student">Student</option>
              <option value="lecturer">Lecturer</option>
              <option value="admin">Admin</option>
            </select>
          </div>
          <div class="form-group">
            <label>👤 Username</label>
            <input
              type="text"
              id="loginUsername"
              placeholder="Enter your username"
              required
            />
          </div>
          <div class="form-group">
            <label>🔐 Password</label>
            <input
              type="password"
              id="loginPassword"
              placeholder="Enter your password"
              required
            />
          </div>

          <button type="submit">START YOUR QUEST 🚀</button>
        </form>

        <!-- Fun Fact Section -->
        <div class="fun-fact">
          <p>
            <strong>Did you know? 💡</strong> Students using gamified platforms
            show 35% higher engagement!
          </p>
        </div>

        <!-- Sign up link -->
        <p class="signup-link">
          Don't have an account? <a href="SignUp.html">Sign up here</a>!
        </p>
      </div>
      <!-- login-box end -->
    </div>
    <!-- container end -->

    <script src="script.js"></script>
  </body>
</html>
