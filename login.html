<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SlidePlay - Login</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Main container -->
    <div class="container">
      <!-- Login Box -->
      <div class="login-box">
        <!-- Floating decorative badges INSIDE the login box -->
        <div class="floating-badge">📈</div>
        <div class="floating-badge badge2">🎯</div>
        <div class="floating-badge badge3">⭐</div>

        <!-- Header -->
        <div class="header">
          <h1>SlidePlay 🎮</h1>
          <p>Level Up Your Learning Game</p>
        </div>

        <!-- Login Form -->
        <form class="login-form">
          <div class="form-group">
            <label>Login As</label>
            <select required>
              <option value="">Select Role</option>
              <option value="student">Student</option>
              <option value="lecturer">Lecturer</option>
              <option value="admin">Admin</option>
            </select>
          </div>
          <div class="form-group">
            <label>👤 Username</label>
            <input type="text" placeholder="Enter your username" required />
          </div>
          <div class="form-group">
            <label>🔐 Password</label>
            <input type="password" placeholder="Enter your password" required />
          </div>

          <div class="options">
            <label><input type="checkbox" /> Remember Me</label>
            <a href="#">Forgot Password?</a>
          </div>

          <button type="submit">START YOUR QUEST 🚀</button>
        </form>

        <!-- Fun Fact Section -->
        <div class="fun-fact">
          <p>
            <strong>Did you know? 💡</strong> Students using gamified platforms
            show 35% higher engagement!
          </p>
        </div>

        <!-- Sign up link -->
        <p class="signup-link">
          Don't have an account? <a href="SignUp.html">Sign up here</a>!
        </p>
      </div>
      <!-- login-box end -->
    </div>
    <!-- container end -->
  </body>
</html>
