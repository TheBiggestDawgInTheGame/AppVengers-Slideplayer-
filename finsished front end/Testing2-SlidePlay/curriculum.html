<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Student Notebook | SlidePlay</title>
    <link rel="stylesheet" href="Choose_expo.css" />
    <link rel="stylesheet" href="page-transition.css" />
    <style>
      .notebook-container {
        max-width: 900px;
        margin: 40px auto;
        background: var(--panel, #181c2f);
        border-radius: 12px;
        box-shadow: 0 4px 24px rgba(0,0,0,0.12);
        padding: 32px 24px;
      }
      .notebook-title {
        font-family: "Orbitron", sans-serif;
        font-size: 2.2rem;
        margin-bottom: 18px;
        color: var(--cyan, #2de2ff);
      }
      .tab-bar {
        display: flex;
        gap: 18px;
        margin-bottom: 24px;
      }
      .tab-btn {
        background: none;
        border: none;
        font-family: "Orbitron", sans-serif;
        font-size: 1.1rem;
        color: var(--muted, #97a2c8);
        padding: 10px 22px;
        border-radius: 8px 8px 0 0;
        cursor: pointer;
        transition: background 0.2s, color 0.2s;
      }
      .tab-btn.active {
        background: var(--cyan, #2de2ff);
        color: #181c2f;
        font-weight: bold;
      }
      .tab-content {
        display: none;
      }
      .tab-content.active {
        display: block;
      }
      .entry-list {
        list-style: none;
        padding: 0;
      }
      .entry-item {
        background: var(--bg, #10131e);
        margin-bottom: 18px;
        border-left: 4px solid var(--cyan, #2de2ff);
        padding: 18px 20px;
        border-radius: 8px;
        transition: box-shadow 0.2s;
        cursor: pointer;
      }
      .entry-item:hover {
        box-shadow: 0 2px 12px rgba(45,226,255,0.08);
      }
      .entry-title {
        font-size: 1.2rem;
        font-weight: 600;
        margin-bottom: 6px;
      }
      .entry-date {
        font-size: 0.95rem;
        color: var(--muted, #97a2c8);
      }
      .entry-details {
        margin-top: 10px;
        color: var(--text, #e9eeff);
        font-size: 1rem;
        line-height: 1.6;
        display: none;
      }
      .entry-item.open .entry-details {
        display: block;
      }
      .no-entries {
        color: var(--muted, #97a2c8);
        text-align: center;
        margin-top: 40px;
      }
    </style>
  </head>
  <body>
    <div class="notebook-container">
      <div class="notebook-title">Student Notebook</div>
      <div class="tab-bar">
        <button class="tab-btn active" data-tab="notebook">Notebook</button>
        <button class="tab-btn" data-tab="archive">Archive</button>
      </div>
      <div class="tab-content active" id="notebookTab">
        <ul class="entry-list" id="entryList"></ul>
        <div class="no-entries" id="noEntries">No previous work found.</div>
      </div>
      <div class="tab-content" id="archiveTab">
        <div class="no-entries">Archive is empty.</div>
      </div>
    </div>
    <script>
      // Tab logic
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
          btn.classList.add('active');
          document.getElementById(btn.dataset.tab + 'Tab').classList.add('active');
        });
      });
      // Example: { title, content, date }
      function getNotebookEntries() {
        try {
          return JSON.parse(localStorage.getItem('sp_notebook') || '[]');
        } catch (e) {
          return [];
        }
      }
      function renderEntries() {
        const entries = getNotebookEntries();
        const list = document.getElementById('entryList');
        const noEntries = document.getElementById('noEntries');
        list.innerHTML = '';
        if (!entries.length) {
          noEntries.style.display = 'block';
          return;
        }
        noEntries.style.display = 'none';
        entries.sort((a, b) => new Date(b.date) - new Date(a.date));
        entries.forEach((entry, idx) => {
          const li = document.createElement('li');
          li.className = 'entry-item';
          // Rich details: fileName, gameType, results, corrections, notes
          li.innerHTML = `
            <div class="entry-title">${entry.title || 'Untitled Entry'}</div>
            <div class="entry-date">${new Date(entry.date).toLocaleString()}</div>
            <div class="entry-details">
              ${entry.fileName ? `<div><strong>File:</strong> ${entry.fileName}</div>` : ''}
              ${entry.gameType ? `<div><strong>Game Type:</strong> ${entry.gameType}</div>` : ''}
              ${entry.results ? `<div><strong>Results:</strong> ${entry.results}</div>` : ''}
              ${entry.corrections ? `<div><strong>Corrections:</strong> ${entry.corrections}</div>` : ''}
              ${entry.notes ? `<div><strong>Notes:</strong> ${entry.notes}</div>` : ''}
              ${entry.content ? `<div><strong>Summary:</strong> ${entry.content}</div>` : ''}
            </div>
          `;
          li.addEventListener('click', function() {
            li.classList.toggle('open');
          });
          list.appendChild(li);
        });
      }
      renderEntries();
    </script>
    <script src="i18n-sa.js"></script>
  <script src="/back-nav.js"></script>
</body>
</html>
