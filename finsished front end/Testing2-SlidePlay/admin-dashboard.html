<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard | SlidePlay</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
      }

      body {
        background: #05060d;
        color: white;
        display: flex;
        min-height: 100vh;
      }

      /* SIDEBAR */
      .sidebar {
        width: 260px;
        background: rgba(17, 24, 39, 0.6);
        backdrop-filter: blur(20px);
        border-right: 1px solid rgba(255, 255, 255, 0.08);
        padding: 2rem 1.5rem;
      }

      .logo {
        font-family: "Orbitron", sans-serif;
        font-size: 1.6rem;
        background: linear-gradient(90deg, #8b5cf6, #06b6d4);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 2rem;
      }

      .nav {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .nav a {
        color: #cbd5e1;
        text-decoration: none;
        padding: 0.8rem 1rem;
        border-radius: 10px;
        transition: 0.3s;
      }

      .nav a:hover {
        background: rgba(139, 92, 246, 0.2);
        color: white;
      }

      /* MAIN */
      .main {
        flex: 1;
        padding: 2rem;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2rem;
      }

      .topbar h1 {
        font-family: "Orbitron", sans-serif;
        font-size: 1.8rem;
      }

      .badge {
        padding: 0.4rem 1rem;
        border-radius: 20px;
        background: linear-gradient(90deg, #8b5cf6, #06b6d4);
        font-size: 0.8rem;
      }

      /* CARDS */
      .cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 1.5rem;
        margin-bottom: 2rem;
      }

      .card {
        background: rgba(17, 24, 39, 0.6);
        backdrop-filter: blur(18px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        padding: 1.5rem;
        border-radius: 16px;
        transition: 0.3s;
      }

      .card:hover {
        transform: translateY(-5px);
        border-color: #8b5cf6;
      }

      .card h2 {
        font-family: "Orbitron", sans-serif;
        font-size: 1.8rem;
        color: #8b5cf6;
      }

      .card p {
        color: #94a3b8;
        margin-top: 0.5rem;
      }

      /* TABLE */
      .table {
        background: rgba(17, 24, 39, 0.6);
        border-radius: 16px;
        padding: 1.5rem;
        backdrop-filter: blur(18px);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .table h3 {
        margin-bottom: 1rem;
        font-family: "Orbitron", sans-serif;
      }

      .row {
        display: flex;
        justify-content: space-between;
        padding: 0.8rem 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        color: #cbd5e1;
      }

      .row:last-child {
        border-bottom: none;
      }

      /* RESPONSIVE */
      @media (max-width: 768px) {
        body {
          flex-direction: column;
        }

        .sidebar {
          width: 100%;
        }
      }
    </style>
  </head>

  <body>
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="logo">SlidePlay Admin</div>

      <div class="nav">
        <a href="#"><i class="fa fa-users"></i> Users</a>
        <a href="#"><i class="fa fa-chart-line"></i> Analytics</a>
        <a href="#"><i class="fa fa-user-shield"></i> Roles</a>
        <a href="#"><i class="fa fa-cog"></i> Settings</a>
      </div>
    </div>

    <!-- MAIN -->
    <div class="main">
      <div class="topbar">
        <h1>Admin Dashboard</h1>
        <div class="badge">SYSTEM CONTROL</div>
      </div>

      <!-- CARDS -->
      <div class="cards">
        <div class="card">
          <h2>1,240</h2>
          <p>Total Users</p>
        </div>

        <div class="card">
          <h2>980</h2>
          <p>Students</p>
        </div>

        <div class="card">
          <h2>120</h2>
          <p>Teachers</p>
        </div>

        <div class="card">
          <h2>12</h2>
          <p>Admins</p>
        </div>
      </div>

      <!-- ACTIVITY -->
      <div class="table">
        <h3>Recent Activity</h3>

        <div class="row">
          <span>New user registered</span>
          <span>2 min ago</span>
        </div>

        <div class="row">
          <span>Teacher account created</span>
          <span>10 min ago</span>
        </div>

        <div class="row">
          <span>System login detected</span>
          <span>1 hour ago</span>
        </div>
      </div>
    </div>
  </body>
</html>
