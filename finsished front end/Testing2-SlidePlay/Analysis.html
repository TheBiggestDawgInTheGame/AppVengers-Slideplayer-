<!DOCTYPE html>
<html lang="en">
<head>
    <link
  href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Poppins:wght@300;400;500;600;700&display=swap"
  rel="stylesheet"
/>
    <meta charset="UTF-8">
    

    <title>SlidePlayer | Analysis</title>
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="Analyis.css">
  <link rel="stylesheet" href="page-transition.css">
    <style>
/* GLOBAL FONT SYSTEM */
body {
  font-family: "Poppins", sans-serif;
}

/* HEADINGS + BRAND ELEMENTS */
h1, h2, h3, h4, .logo, .hero-title {
  font-family: "Orbitron", sans-serif;
}

/* BUTTONS */
button, .signup-btn, .start-btn {
  font-family: "Orbitron", sans-serif;
}

/* TEXT ELEMENTS */
p, a, input, textarea, label {
  font-family: "Poppins", sans-serif;
}
</style>
</head>


<body>

    <div class="loader-wrapper">
        <div class="progress-circle" id="progressCircle">
            <div class="circle-inner">
                <span id="percent-number">0%</span>
            </div>
        </div>

        <div class="status-container">
            <h2 id="status-text" class="pulse">PROCESSING</h2>
            <p class="status-sub">SYSTEM ANALYSIS IN PROGRESS</p>
            <button id="continue-btn" class="continue-button" onclick="handleContinue()">
            CONTINUE <i class="fa-solid fa-arrow-right"></i>
        </button>
        </div>
    </div>

    <!-- <footer>
      <p>© 2026 SlidePlay. All Rights Reserved.</p>
    </footer> -->

    <script src="Analysis.js"></script>
    <script>
      function applyTheme(theme) {
        const body = document.body;
        body.classList.remove('dark-mode', 'light-mode');
        body.classList.add(theme);
      }

      window.addEventListener('DOMContentLoaded', () => {
        const savedTheme = localStorage.getItem('slideplayTheme');
        if (savedTheme === 'light-mode' || savedTheme === 'dark-mode') {
          applyTheme(savedTheme);
        } else {
          applyTheme('dark-mode');
        }
      });
    </script>
  <script src="page-transition.js"></script>
</body>
</html>
