<!doctype html>
<html lang="en">
  <head>
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <meta charset="UTF-8" />

    <title>SlidePlayer - Loading</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="loading.css" />
    <link rel="stylesheet" href="page-transition.css" />
    <style>
      /* GLOBAL FONT SYSTEM */
      body {
        font-family: "Poppins", sans-serif;
      }

      /* HEADINGS + BRAND ELEMENTS */
      h1,
      h2,
      h3,
      h4,
      .logo,
      .hero-title {
        font-family: "Orbitron", sans-serif;
      }

      /* BUTTONS */
      button,
      .signup-btn,
      .start-btn {
        font-family: "Orbitron", sans-serif;
      }

      /* TEXT ELEMENTS */
      p,
      a,
      input,
      textarea,
      label {
        font-family: "Poppins", sans-serif;
      }
    </style>
  </head>
  <body>
    <div class="loading-container">
      <div class="loading-content">
        <h1 class="loading-title">SlidePlayer</h1>
        <div class="loader"></div>
        <p class="loading-text">Loading your experience...</p>
      </div>
    </div>

    <script>
      function getTargetPage() {
        const params = new URLSearchParams(window.location.search);
        const target = params.get("target");
        return target ? decodeURIComponent(target) : "Dashboard (1).html";
      }

      const targetPage = getTargetPage();
      const redirectDelayMs = 450;
      setTimeout(() => {
        window.location.href = targetPage;
      }, redirectDelayMs);
    </script>

    <script>
      function applyTheme(theme) {
        const body = document.body;
        body.classList.remove("dark-mode", "light-mode");
        body.classList.add(theme);
      }

      window.addEventListener("DOMContentLoaded", () => {
        const savedTheme = localStorage.getItem("slideplayTheme");
        if (savedTheme === "light-mode" || savedTheme === "dark-mode") {
          applyTheme(savedTheme);
        } else {
          applyTheme("dark-mode");
        }
      });
    </script>
    <script src="page-transition.js"></script>
    <script src="i18n-sa.js"></script>
</body>
</html>
