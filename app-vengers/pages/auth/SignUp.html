<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SlidePlay - Sign Up</title>
    <link rel="stylesheet" href="signup.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>

  <body class="auth-page">
    <div id="particles"></div>
    <div class="signup-box">
      <div class="signup-header">
        <h2>Create Account</h2>
        <p class="signup-subtitle">Plug into the neon classroom network</p>
      </div>

      <form id="signupForm" class="signup-form">
        <div class="input-box">
          <i class="fa-solid fa-user"></i>
          <input
            type="text"
            id="username"
            class="input-field"
            placeholder="Enter username"
            required
          />
        </div>

        <div class="role-selector">
          <p class="role-label">I am a&hellip;</p>
          <div class="role-toggle">
            <button type="button" class="role-btn active" data-role="student">
              <i class="fa-solid fa-graduation-cap"></i> Student
            </button>
            <button type="button" class="role-btn" data-role="teacher">
              <i class="fa-solid fa-chalkboard-user"></i> Teacher
            </button>
          </div>
          <input type="hidden" id="selectedRole" value="student" />
        </div>

        <div class="input-box">
          <i class="fa-solid fa-envelope"></i>
          <input
            type="email"
            id="email"
            class="input-field"
            placeholder="Enter email"
            required
          />
        </div>

        <div class="input-box">
          <i class="fa-solid fa-cake-candles"></i>
          <input
            type="number"
            id="age"
            class="input-field"
            placeholder="Enter age"
            min="5"
            max="120"
            title="Enter your age"
            aria-label="Age"
            required
          />
        </div>

        <div class="input-box">
          <i class="fa-solid fa-lock"></i>
          <input
            type="password"
            id="password"
            class="input-field"
            placeholder="Create password"
            required
          />
        </div>

        <div class="input-box">
          <i class="fa-solid fa-lock"></i>
          <input
            type="password"
            id="confirmPassword"
            class="input-field"
            placeholder="Confirm password"
            required
          />
        </div>

        <button class="signup-btn" type="submit">Create Account</button>

        <div class="auth-divider" aria-hidden="true">
          <span>or</span>
        </div>

        <button class="google-signup-btn" id="googleSignupBtn" type="button" aria-label="Sign up with Google">
          <i class="fa-brands fa-google"></i>
          <span>Sign up with Google</span>
        </button>
      </form>

      <div class="login-link">
        <p>Already have an account? <a href="login.html">Login</a></p>
      </div>
    </div>

    <script>
      const container = document.getElementById("particles");

      function createParticle() {
        const particle = document.createElement("div");
        particle.classList.add("particle");

        // random position
        particle.style.left = Math.random() * 100 + "vw";

        // random size
        const size = Math.random() * 6 + 2;
        particle.style.width = size + "px";
        particle.style.height = size + "px";

        // random hue and drift for a more lively field
        particle.style.setProperty("--h", Math.floor(Math.random() * 80 + 180));
        particle.style.setProperty("--x", Math.floor(Math.random() * 120 - 60) + "px");
        particle.style.opacity = (Math.random() * 0.45 + 0.3).toFixed(2);

        // random speed
        const duration = Math.random() * 5 + 5;
        particle.style.animationDuration = duration + "s";

        container.appendChild(particle);

        // remove after animation
        setTimeout(() => {
          particle.remove();
        }, duration * 1000);
      }

      // generate particles continuously
      setInterval(createParticle, 150);
    </script>
    <script src="signup.js"></script>
  </body>
</html>
