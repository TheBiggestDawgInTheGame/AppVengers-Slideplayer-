<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="reset.css">
    <title>Reset Password Page</title>
</head>
<body>
   <div class="reset-page">
    <div id="resetForm">
        <h2 class="resetPassword-header">Reset Password</h2>
        <form action="">
            <input type="email" id="reset" placeholder="Enter your email" required>
            <button type="submit" id="sendBtn">Send email</button>
        </form>
    </div>
   </div>
     <script>
         document.getElementById('sendBtn').addEventListener('click', function(e) {
             e.preventDefault();
             const email = document.getElementById('reset').value.trim();
             if (!email) {
                 alert('Please enter your email!');
                 return;
             }
             alert('Password reset link sent to ' + email + ' ✉️');
             setTimeout(() => {
                 window.location.href = 'login.html';
             }, 2000);
         });
     </script>
</body>
</html>
