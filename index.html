<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes"
    />
    <meta name="theme-color" conent="#667eea" />
    <meta name="description" content="SidePlay - Level Up Your Learning Game" />

    <title>SidePlay - Login</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="login-box">
        <!--this is the main logo or title section  -->
        <div class="header">
          <h1>SidePlay🎮</h1>
          <p>Level Up Your Learning Game</p>
        </div>

        <!-- Login form -->
        <form class="login-form" id="loginform">
          <!-- Username field -->
          <div class="form-group">
            <label class="username">
              <span class="label-icon">👤</span> Username
            </label>
            <input
              type="text"
              id="username"
              placeholder="Enter your username"
              required
              class="input-field"
            />
          </div>
          <!-- Password field -->
          <div class="form-group">
            <label class="password">
              <span class="label-icon">🔐</span> Password
            </label>
            <input
              type="password"
              id="password"
              placeholder="Enter your password"
              required
              class="input-field"
            />
          </div>
          <!-- Remember Me or Forgot Password -->
          <div class="options">
            <label class="remember-me">
              <input type="checkbox" /> Remember Me
            </label>
            <a href="#" class="forgot-password">Forgot Password</a>
          </div>

          <!-- Login Button -->
          <button type="submit" class="login-btn">START YOUR QUEST🚀</button>
        </form>

        <!-- Sign up link -->
        <div class="sign-link">
          <p>
            Don't have an account? <a href="#">Sign up here</a> and join the
            game!
          </p>
        </div>

        <!-- Fun facts section -->
        <div class="fun-fact">
          <p>
            <strong>Did you know?💡</strong> Students using gamified platforms
            show 35% higher engagement!
          </p>
        </div>
      </div>

      <!-- Floating decorative elements -->
      <div class="floating-badge">📈</div>
      <div class="floating-badge badge2">🎯</div>
      <div class="floating-badge badge3">⭐</div>
    </div>
  </body>
</html>
