<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SlidePlay</title>
  <meta http-equiv="refresh" content="0; url=./slide_upload/index.html">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: #0b1024;
      color: #f3f6ff;
    }

    .card {
      max-width: 520px;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.04);
      text-align: center;
    }

    a {
      color: #63f0ff;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>SlidePlay</h1>
    <p>Launching upload flow...</p>
    <p>If redirect does not start, open <a href="./slide_upload/index.html">Upload Page</a>.</p>
  </div>
</body>
</html>
