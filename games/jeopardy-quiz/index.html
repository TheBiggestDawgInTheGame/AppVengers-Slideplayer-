<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jeopardy Learning Game</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  </head>
  <body>
    <div id="game-container">
      <!-- 3D Universe Background -->
      <div id="threejs-scene"></div>

      <!-- Main Game Interface -->
      <div id="game-ui">
        <div id="upload-screen" class="screen active">
          <div class="upload-card">
            <h1>🎓 Jeopardy Learning Game</h1>
            <p>Upload your learning material to create an interactive quiz!</p>
            <input
              type="file"
              id="file-input"
              accept=".txt,.pdf,.doc,.docx,.md"
              multiple
            />
            <label for="file-input" class="file-upload-btn">
              📁 Choose Learning Material
            </label>
            <div id="file-list"></div>
            <div class="quiz-config-row">
              <label class="quiz-config-field" for="question-count-input">
                <span>Questions to Ask</span>
                <input
                  type="number"
                  id="question-count-input"
                  min="5"
                  max="40"
                  value="20"
                />
              </label>
              <p class="quiz-config-hint">Choose between 5 and 40 questions for each round.</p>
            </div>
            <button id="start-game-btn" class="btn-primary" disabled>
              Start Quiz
            </button>
          </div>
        </div>

        <div id="question-screen" class="screen">
          <div class="question-header">
            <div class="score-display">
              Score: <span id="current-score">0</span>
            </div>
            <div class="progress-display">
              Question <span id="current-question">1</span> of
              <span id="total-questions">0</span>
            </div>
          </div>
          <div class="question-card">
            <div class="category-display" id="question-category"></div>
            <div class="question-text" id="question-text"></div>
            <div class="answers-grid" id="answers-container"></div>
            <div class="timer-bar">
              <div class="timer-progress" id="timer-progress"></div>
            </div>
          </div>
        </div>

        <div id="results-screen" class="screen">
          <div class="results-card">
            <h2>🏆 Quiz Complete!</h2>
            <div class="final-score">
              Final Score: <span id="final-score">0</span>
            </div>
            <div class="accuracy">
              Accuracy: <span id="accuracy-percent">0</span>%
            </div>
            <div class="performance-chart" id="performance-chart"></div>
            <button id="restart-btn" class="btn-primary">Play Again</button>
          </div>
        </div>
      </div>
    </div>

    <script src="utils/FileReader.js"></script>
    <script src="utils/QuizGenerator.js"></script>
    <script src="components/UploadScreen.js"></script>
    <script src="components/QuestionScreen.js"></script>
    <script src="components/ResultsScreen.js"></script>
    <script src="../../shared/premium-game-reporter.js"></script>
    <script src="script.js"></script>
  </body>
</html>
